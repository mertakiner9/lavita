<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lavita</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f9f9f9;
      color: #333;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background-color: #2d6a4f;
      color: white;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 1.8rem;
      letter-spacing: 1px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 1.5rem;
      font-size: 1rem;
    }

    nav a:hover {
      text-decoration: underline;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
    }

    .hero h2 {
      font-size: 2.5rem;
      color: #2d6a4f;
      margin-bottom: 1rem;
    }

    .hero p {
      font-size: 1.2rem;
      color: #555;
      max-width: 600px;
      line-height: 1.8;
      margin-bottom: 2rem;
    }

    .btn {
      background-color: #2d6a4f;
      color: white;
      padding: 0.8rem 2rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      background-color: #1b4332;
    }

    footer {
      background-color: #2d6a4f;
      color: white;
      text-align: center;
      padding: 1rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Lavita</h1>
    <nav>
      <a href="#">Ana Sayfa</a>
      <a href="#">Hakkında</a>
      <a href="#">İletişim</a>
    </nav>
  </header>

  <main>
    <div class="hero">
      <h2>Hoş Geldiniz</h2>
      <p>Lavita, yaşam kalitenizi artırmak için tasarlanmış bir platformdur. Sağlık, wellness ve daha fazlası için buradayız.</p>
      <a href="#" class="btn">Keşfet</a>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Lavita. Tüm hakları saklıdır.</p>
  </footer>
</body>
</html>
